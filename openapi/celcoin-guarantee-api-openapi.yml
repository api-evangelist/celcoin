        in: header
        description: Bank Correspondent Agent Id
        schema:
          type: string
      requestBody:
        description: Identificador da averbação e competência (YYYY-MM).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAnticipationRequest'
          text/json:
            schema:
