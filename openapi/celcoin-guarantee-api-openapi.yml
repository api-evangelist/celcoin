openapi: 3.0.1
info:
  title: billissuance-settlement-webservice AnnotationCompetenceCalendar Guarantee API
  version: v1.0.0
servers:
- url: https://sandbox.openfinance.celcoin.dev/billissuance/v1
tags:
- name: Guarantee
paths:
  /guarantee/get-links:
    get:
      tags:
      - Guarantee
      summary: Consults the employment links associated with a specific document.
      parameters:
      - name: document
        in: query
        required: true
        schema:
          type: string
      - name: consigneeId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      - name: agencyId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      - name: token-data
        in: header
        description: Authorization Token (only if needed)
        schema:
          type: string
      - name: correspAgentId
        in: header
        description: Bank Correspondent Agent Id
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLinksResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /guarantee/get-data:
    get:
      tags:
      - Guarantee
      summary: Retrieves comprehensive data associated with a specific document.
      parameters:
      - name: document
        in: query
        required: true
        schema:
          type: string
      - name: consigneeId
        in: query
        required: true
        schema:
          type: string
      - name: agencyId
        in: query
        required: true
        schema:
          type: string
      - name: periods
        in: query
        schema:
          type: integer
          format: int32
      - name: registration
        in: query
        schema:
          type: string
      - name: token-data
        in: header
        description: Authorization Token (only if needed)
        schema:
          type: string
      - name: correspAgentId
        in: header
        description: Bank Correspondent Agent Id
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckBalanceContractResponse'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /guarantee:
    post:
      tags:
      - Guarantee
      summary: Initiates or schedules an annotation registration process.
      parameters:
      - name: Pin
        in: header
        schema:
          type: string
      - name: correspAgentId
        in: header
        description: Bank Correspondent Agent Id
        schema:
          type: string
      requestBody:
        description: Annotation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuaranteeRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/GuaranteeRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/GuaranteeRequest'
      responses:
